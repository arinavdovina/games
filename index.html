<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конструктор Промтов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.4);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .step-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        
        .step-title:first-of-type {
            margin-top: 0;
        }

        .step-title span {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.9rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label.field-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: #fff;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            cursor: pointer;
        }

        .flex-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        #dynamic-fields {
            background: rgba(99, 102, 241, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed var(--primary);
            margin-bottom: 25px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .feature-card {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            font-size: 0.95rem;
            user-select: none;
        }

        .feature-card:hover {
            border-color: var(--primary-hover);
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .feature-card input[type="checkbox"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .feature-card.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .hidden-field {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;
        }

        .hidden-field.show {
            max-height: 100px;
            opacity: 1;
            margin-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        button.btn-main {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 10px 20px -10px var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button.btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--primary);
        }

        button.btn-main:active {
            transform: translateY(1px);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-section {
            margin-top: 40px;
            display: none;
            animation: fadeInUp 0.5s ease-out;
            padding-top: 30px;
            border-top: 2px dashed var(--border-glass);
        }

        textarea#result-prompt {
            height: 450px;
            resize: vertical;
            margin-bottom: 15px;
            line-height: 1.6;
            background: #f8fafc;
            border-color: #cbd5e1;
            font-family: monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        button.btn-copy {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 10px 20px -10px #10b981;
        }

        button.btn-copy:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }

        .toast {
            background: white;
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 4px solid #10b981;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Конструктор</h1>
        <p class="subtitle">Ультимативный генератор промтов для интерактивных уроков</p>
    </header>

    <div class="step-title"><span>1</span> Вводные данные</div>
    <div class="grid-3">
        <div class="form-group">
            <label class="field-label" for="subject">Предмет:</label>
            <input type="text" id="subject" placeholder="Например: Биология">
        </div>
        <div class="form-group">
            <label class="field-label" for="grade">Аудитория:</label>
            <input type="text" id="grade" placeholder="Например: 7 класс">
        </div>
        <div class="form-group">
            <label class="field-label" for="question-count">Кол-во вопросов:</label>
            <div class="flex-row">
                <input type="number" id="question-count" placeholder="10" value="10" min="1" style="width: 80px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="auto-questions" onchange="app.toggleAutoQuestions()">
                    Авто
                </label>
            </div>
        </div>
    </div>
    
    <div class="grid-2">
        <div class="form-group">
            <label class="field-label" for="topic">Тема урока:</label>
            <input type="text" id="topic" placeholder="Например: Строение клетки">
        </div>
        <div class="form-group">
            <label class="field-label" for="ui-lang">Язык интерфейса:</label>
            <select id="ui-lang" onchange="app.toggleCustomLang()">
                <option value="Русский">🇷🇺 Русский</option>
                <option value="Английский">🇬🇧 Английский (English)</option>
                <option value="Испанский">🇪🇸 Испанский (Español)</option>
                <option value="custom">✍️ Свой вариант...</option>
            </select>
            <div id="custom-lang-wrapper" class="hidden-field">
                <input type="text" id="custom-lang" placeholder="Введите язык (напр., Казахский)">
            </div>
        </div>
    </div>

    <div class="grid-3">
        <div class="form-group">
            <label class="field-label" for="game-mode">Режим игры:</label>
            <select id="game-mode" onchange="app.toggleTeamCount()">
                <option value="Индивидуальное прохождение">👤 Индивидуальное</option>
                <option value="2 игрока">👥 2 игрока</option>
                <option value="Против компьютера (робота)">🤖 Против робота</option>
                <option value="Несколько команд">🏟 Несколько команд</option>
            </select>
            <div id="team-count-wrapper" class="hidden-field">
                <input type="number" id="team-count" placeholder="Кол-во команд" min="3" max="10">
            </div>
        </div>
        <div class="form-group">
            <label class="field-label" for="lang-level">Уровень языка:</label>
            <select id="lang-level">
                <option value="Любой / Не применимо">Не важно</option>
                <option value="A1 (Beginner)">A1 (Beginner)</option>
                <option value="A2 (Elementary)">A2 (Elementary)</option>
                <option value="B1 (Intermediate)">B1 (Intermediate)</option>
                <option value="B2 (Upper-Intermediate)">B2 (Upper-Intermediate)</option>
                <option value="C1 (Advanced)">C1 (Advanced)</option>
            </select>
        </div>
        <div class="form-group">
            <label class="field-label" for="device-adapt">Устройство:</label>
            <select id="device-adapt">
                <option value="adaptive">💻📱 Адаптивно (ПК + Моб)</option>
                <option value="desktop">💻 Только ПК</option>
                <option value="mobile">📱 Только Телефон</option>
            </select>
        </div>
    </div>

    <div class="step-title"><span>2</span> Выбор механики</div>
    <div class="form-group">
        <select id="game-type" onchange="app.updateDynamicFields()">
            <option value="" disabled selected>✨ Выберите тип интерактива...</option>
            <optgroup label="Ваши шаблоны">
                <option value="bowling">Боулинг</option>
                <option value="true_false">Правда или Ложь (квадраты)</option>
                <option value="puzzle">Собери пазл знаний</option>
                <option value="drag_drop">Drag-and-Drop (сопоставление)</option>
            </optgroup>
            <optgroup label="Телешоу и викторины">
                <option value="millionaire">Кто хочет стать миллионером</option>
                <option value="100_to_1">100 к одному</option>
                <option value="jeopardy">Своя игра (Jeopardy!)</option>
                <option value="wheel">Колесо фортуны</option>
            </optgroup>
            <optgroup label="Командные и соревновательные">
                <option value="team_basic">Командная игра (2 команды + счет)</option>
                <option value="team_20_windows">2 команды (20 окон с переходом хода)</option>
                <option value="battleship">Морской бой</option>
                <option value="tanks">Танки против компьютера</option>
            </optgroup>
            <optgroup label="Логические и классические">
                <option value="hangman">Виселица</option>
                <option value="mega_tictactoe">Большие крестики-нолики</option>
                <option value="sudoku">Судоку с вопросами</option>
                <option value="rps">Камень, ножницы, бумага</option>
            </optgroup>
            <optgroup label="Приключения">
                <option value="board_game">Игра бродилка (Кидай кубик)</option>
                <option value="quest">Интерактивный квест (Выбор пути)</option>
            </optgroup>
        </select>
    </div>

    <div id="dynamic-fields"></div>

    <div class="step-title"><span>3</span> Дополнительные фичи (по желанию)</div>
    <div class="features-grid">
        <label class="feature-card" onclick="app.toggleCardClass(this)">
            <input type="checkbox" class="extra-feature" value="Добавь визуальный Progress Bar (шкалу прогресса) вверху или внизу экрана, который заполняется по мере ответа на вопросы.">
            <span>📊 Шкала прогресса</span>
        </label>
        <label class="feature-card" onclick="app.toggleCardClass(this)">
            <input type="checkbox" class="extra-feature" value="Добавь визуальный таймер обратного отсчета (например, 30 секунд) для каждого вопроса. Если время вышло - автоматически засчитывается неверный ответ.">
            <span>⏱️ Таймер на вопрос</span>
        </label>
        <label class="feature-card" onclick="app.toggleCardClass(this)">
            <input type="checkbox" class="extra-feature" value="Добавь систему 'Жизней' (например, 3 иконки сердечка). При неверном ответе сгорает одна жизнь. Если жизней 0 - игра окончена.">
            <span>❤️ Система жизней</span>
        </label>
        <label class="feature-card" onclick="app.toggleCardClass(this)">
            <input type="checkbox" class="extra-feature" value="Используй Web Audio API или базовые HTML5 Audio (с генерацией простых частот или Base64 заглушками) для добавления звуковых эффектов: клик, верный ответ, ошибка.">
            <span>🔊 Звуковые эффекты</span>
        </label>
        <label class="feature-card" onclick="app.toggleCardClass(this)">
            <input type="checkbox" class="extra-feature" value="Реализуй красивую CSS/JS анимацию конфетти (или салюта) на финальном экране при успешном прохождении игры.">
            <span>🎉 Конфетти (победа)</span>
        </label>
    </div>

    <button class="btn-main" id="btn-generate" onclick="app.generatePrompt()">
        <span>Сгенерировать магию</span>
        <div class="loader" id="loader"></div>
    </button>

    <div class="result-section" id="result-section">
        <div class="step-title"><span>4</span> Ваш идеальный промт</div>
        <textarea id="result-prompt" readonly></textarea>
        <button class="btn-copy" onclick="app.copyToClipboard()">
            📋 Скопировать код
        </button>
    </div>
</div>

<div id="toast-container"></div>

<script>
    const app = {
        games: {
            bowling: {
                fields: [{ id: "format", label: "Формат заданий (например: задачи на умножение):", type: "text" }],
                template: `Создай интерактивную HTML - игру "БОУЛИНГ" по теме "{TOPIC}" (Предмет: {SUBJECT}, {GRADE}).\n\nТРЕБОВАНИЯ:\nС левой стороны задание:\n- прямоугольная область, в ней размещён текст вопроса;\n- внизу 3 варианта ответа, один из них верный.\n\nС правой стороны зона - игры боулинг:\n- если ответ верный - мяч летит в кегли и сбивает их (10 кегель - 10 баллов)\n- если не верно, мяч летит мимо (0 баллов)\n- над игровым полем ведется счет\n\nПосле ответа появляется новое задание.\nФормат заданий: {format}\n\nВнешний вид:\n1. Дизайн современный, светлый, небольшая анимация.\n2. Шрифт крупный, читабельный, игровой.`
            },
            true_false: {
                fields: [{ id: "squares", label: "Количество заданий (квадратов) на экране:", type: "number", default: 16 }],
                template: `Создай интерактивную игру по теме "{TOPIC}". Предмет: {SUBJECT}. Для учеников: {GRADE}.\nИгра в виде HTML, CSS, JS кода (в одном файле).\n\nТребования:\n- На экране область с {squares} квадратами.\n- На каждом квадрате номер.\n- При нажатии открывается вопрос-утверждение и под ним заглушка для картинки.\n- Под заданием 2 кнопки: "ПРАВДА" и "ЛОЖЬ".\n- Верно: кнопка зеленая, текст-подтверждение, +10 баллов.\n- Неверно: кнопка красная, текст-подтверждение, 0 баллов.\n- Вернуться к вопросу нельзя.\n\nДизайн:\n- Современный светлый дизайн с анимацией на фоне по теме урока.\n- Плавное появление диалогового окна. Hover-эффекты.`
            },
            puzzle: {
                fields: [{ id: "img_url", label: "Ссылка на фоновое изображение:", type: "text", placeholder: "https://..." }],
                template: `Создай обучающую игру "Собери пазл знаний" по теме "{TOPIC}". {GRADE}.\n\nТребования:\n- Пазл из 9 частей.\n- С левой стороны выбор цифры -> открывается вопрос.\n- Ответ верный -> открывается фрагмент пазла справа.\n- Ответ неверный -> фрагмент остается закрытым.\n- Под пазлом зашифровано изображение: {img_url}\n- Область с заданиями не меняет положения относительно экрана.`
            },
            drag_drop: {
                fields: [],
                template: `Создать одностраничное веб-приложение (игра Drag-and-Drop) на тему "{TOPIC}" ({SUBJECT}) для учеников {GRADE}.\n\nТехнические требования:\n1. Чистый HTML, CSS и JS в одном файле. Без библиотек.\n2. Поддержка Touch Events для мобильных (важно!).\n\nUI/UX:\n1. Шрифт Comic Neue. Текст крупный.\n2. Фон нейтральный с легкой тематической анимацией.\n3. Карточки терминов и зоны ответов одинакового размера.\n\nЛогика:\n1. Слева: карточки для перетаскивания. Справа: пустые ячейки для заданий.\n2. Валидация при отпускании: верно - ячейка зеленая (текст фиксируется), неверно - ячейка красная (анимация тряски, карточка возвращается).\n3. 1 балл за каждый верный. В конце модальное окно с итогом.`
            },
            millionaire: {
                fields: [],
                template: `Создай интерактивную игру "Кто хочет стать миллионером" на HTML/CSS/JS по теме "{TOPIC}" для {GRADE}.\nТребования:\n- Интерфейс в стиле классического шоу (темно-синие тона, золотые рамки).\n- Справа шкала несгораемых сумм.\n- Слева вопрос и 4 варианта ответа (A, B, C, D).\n- 3 подсказки: "50/50", "Звонок другу", "Помощь зала".\n- При неверном ответе игра заканчивается, показывается выигрыш.`
            },
            "100_to_1": {
                fields: [],

            },

            },
            tanks: {
                fields: [],
                template: `Создай игру "Танки против компьютера" на HTML/CSS/JS. Тема: {TOPIC}.\nТребования:\n- 2 поля (игрок и робот). Танк занимает 1 клетку. По 5 танков.\n- Игрок выбирает клетку для удара. Появляется вопрос ({SUBJECT}).\n- Верный ответ: удар наносится. Неверный: ход сгорает.\n- Робот бьет рандомно без вопросов. 8-битная стилистика.`
            },
            hangman: {
                fields: [],
                template: `Создай игру "Виселица" на HTML/JS/CSS. Тема: {TOPIC} ({SUBJECT}).\nТребования:\n- Загадывается термин (прочерки).\n- Ниже экранная клавиатура.\n- Игрок кликает букву. Нет - рисуется виселица (6 ошибок).\n- Кнопка "Следующее слово".`
            },
            mega_tictactoe: {
                fields: [],
                template: `Создай "Большие крестики-нолики" на HTML/CSS/JS. Тема: {TOPIC}.\nМеханика:\n- Поле 3х3, внутри каждой клетки - малое поле 3х3.\n- Игрок кликает клетку малого поля. Появляется вопрос ({SUBJECT}).\n- Верно - Крестик. Неверно - Нолик (играет бот).\n- Чтобы выиграть большую клетку, нужно собрать 3 в ряд в малом поле.`
            },
            sudoku: {
                fields: [],
                template: `Создай "Судоку с вопросами" на HTML/CSS/JS для {GRADE}. Тема: {TOPIC}.\nТребования:\n- Поле 9х9, частично заполненное.\n- Игрок кликает пустую клетку, выбирает цифру -> появляется вопрос.\n- Верно - цифра ставится. Неверно - штраф (минус балл).`
            },
            rps: {
                fields: [],
                template: `Создай обучающую игру "Камень, ножницы, бумага" на HTML/CSS/JS. Тема: {TOPIC} ({SUBJECT}).\nТребования:\n- Игрок играет против компьютера.\n- Перед тем как сделать ход (выбрать камень, ножницы или бумагу), игрок должен правильно ответить на вопрос.\n- Если ответ верный — игрок делает выбор, и раунд разыгрывается.\n- Если ответ неверный — ход сгорает, компьютер автоматически выигрывает раунд.\n- Ведется общий счет побед.`
            },
            board_game: {
                fields: [{ id: "cells", label: "Количество клеток на поле:", type: "number", default: 30 }],
                template: `Создай настольную "Бродилку" в HTML. Тема: {TOPIC}.\nТребования:\n- Змеевидное поле из {cells} клеток.\n- Анимированный кубик (бросок по клику).\n- Фишка двигается. На каждой 3-й клетке "Событие": вопрос по теме {SUBJECT}.\n- Верно: +2 клетки. Неверно: -3 клетки.`
            },
            quest: {
                fields: [],
                template: `Создай текстовый интерактивный квест на HTML/CSS/JS. Тема: {TOPIC} ({GRADE}).\nТребования:\n- Описание ситуации. Внизу 2-3 варианта действий.\n- Выбор правильного (с точки зрения {SUBJECT}) пути продвигает сюжет.\n- Неверный выбор - ловушка (возврат назад).\n- 5 сюжетных этапов. Загадочный дизайн.`
            }
        },

        toggleCustomLang() {
            const select = document.getElementById('ui-lang');
            const wrapper = document.getElementById('custom-lang-wrapper');
            if (select.value === 'custom') {
                wrapper.classList.add('show');
                document.getElementById('custom-lang').focus();
            } else {
                wrapper.classList.remove('show');
            }
        },

        toggleAutoQuestions() {
            const checkbox = document.getElementById('auto-questions');
            const input = document.getElementById('question-count');
            if (checkbox.checked) {
                input.disabled = true;
                input.style.opacity = '0.5';
            } else {
                input.disabled = false;
                input.style.opacity = '1';
            }
        },

        toggleTeamCount() {
            const select = document.getElementById('game-mode');
            const wrapper = document.getElementById('team-count-wrapper');
            if (select.value === 'Несколько команд') {
                wrapper.classList.add('show');
                document.getElementById('team-count').focus();
            } else {
                wrapper.classList.remove('show');
            }
        },

        toggleCardClass(labelElement) {
            setTimeout(() => {
                const checkbox = labelElement.querySelector('input');
                if (checkbox.checked) {
                    labelElement.classList.add('active');
                } else {
                    labelElement.classList.remove('active');
                }
            }, 50);
        },

        updateDynamicFields() {
            const gameId = document.getElementById('game-type').value;
            const container = document.getElementById('dynamic-fields');
            const gameInfo = this.games[gameId];
            
            if (gameInfo && gameInfo.fields && gameInfo.fields.length > 0) {
                container.style.display = 'block';
                let html = '<p style="margin-top:0; color:var(--primary); font-weight:600; font-size:14px; margin-bottom: 15px;">⚙️ Специфичные настройки механики:</p>';
                
                gameInfo.fields.forEach(field => {
                    if (field.type === 'select') {
                        let optionsHtml = field.options.map(opt => 
                            `<option value="${opt.value}">${opt.text}</option>`
                        ).join('');
                        html += `
                            <div class="form-group" style="margin-bottom: 10px;">
                                <label class="field-label" for="dyn_${field.id}">${field.label}</label>
                                <select id="dyn_${field.id}">
                                    ${optionsHtml}
                                </select>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="form-group" style="margin-bottom: 10px;">
                                <label class="field-label" for="dyn_${field.id}">${field.label}</label>
                                <input type="${field.type}" id="dyn_${field.id}" 
                                       placeholder="${field.placeholder || ''}" 
                                       value="${field.default || ''}">
                            </div>
                        `;
                    }
                });
                container.innerHTML = html;
            } else {
                container.style.display = 'none';
                container.innerHTML = '';
            }
        },

        showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✅ <span>${message}</span>`;
            
            container.appendChild(toast);
            void toast.offsetWidth;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        },

        generatePrompt() {
            const gameId = document.getElementById('game-type').value;
            if (!gameId) {
                alert('Сначала выберите тип интерактива во 2-м шаге!');
                return;
            }

            const btnText = document.querySelector('#btn-generate span');
            const loader = document.getElementById('loader');
            const resultSection = document.getElementById('result-section');
            
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultSection.style.display = 'none';

            setTimeout(() => {
                this.buildPromptText(gameId);
                
                btnText.style.display = 'block';
                loader.style.display = 'none';
                
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 800);
        },

        buildPromptText(gameId) {
            const subject = document.getElementById('subject').value || '[ВАШ ПРЕДМЕТ]';
            const topic = document.getElementById('topic').value || '[ТЕМА УРОКА]';
            const grade = document.getElementById('grade').value || '[КЛАСС/АУДИТОРИЯ]';
            
            // Настройка количества вопросов
            const isAutoQ = document.getElementById('auto-questions').checked;
            const qCountInput = document.getElementById('question-count').value;
            const qCount = isAutoQ ? 'ОПТИМАЛЬНОЕ КОЛИЧЕСТВО (определи автоматически под выбранную игровую механику)' : (qCountInput || '10');
            
            // Определяем языки и уровни
            const langSelect = document.getElementById('ui-lang').value;
            const langCustom = document.getElementById('custom-lang').value;
            const finalLang = langSelect === 'custom' ? (langCustom || 'Русский') : langSelect;
            const langLevel = document.getElementById('lang-level').value;

            // Обработка режима игры
            let gameMode = document.getElementById('game-mode').value;
            if (gameMode === 'Несколько команд') {
                const teamCount = document.getElementById('team-count').value || '3';
                gameMode = `Многопользовательский (${teamCount} команды). СРОЧНОЕ ТРЕБОВАНИЕ: Создай стартовый экран перед началом игры. На этом экране должны быть ${teamCount} полей ввода, чтобы пользователи могли сами написать и сохранить названия своих команд. Дальнейшая игра и подсчет баллов должны использовать именно эти введенные названия.`;
            }

            // Обработка адаптации под устройство
            const deviceSelect = document.getElementById('device-adapt').value;
            let deviceText = '';
            if (deviceSelect === 'adaptive') {
                deviceText = "ВЕРСТКА: Сделай верстку полностью адаптивной (Responsive). Используй Flexbox/Grid и @media запросы. Игра должна отлично смотреться и работать как на широких экранах ПК, так и на узких экранах смартфонов. Обязательна поддержка Touch-событий для мобильных устройств.";
            } else if (deviceSelect === 'desktop') {
                deviceText = "ВЕРСТКА: Оптимизируй интерфейс ИСКЛЮЧИТЕЛЬНО под экраны ПК (ландшафтная ориентация). Можешь использовать фиксированные пропорции и крупные элементы. Поддержка мобильных телефонов не требуется.";
            } else if (deviceSelect === 'mobile') {
                deviceText = "ВЕРСТКА: Оптимизируй интерфейс ИСКЛЮЧИТЕЛЬНО под экраны смартфонов (Mobile First, портретная ориентация). Элементы управления должны быть крупными, чтобы было удобно нажимать пальцем. Обязательна поддержка Touch-событий (касания, свайпы).";
            }

            // Собираем доп фичи
            const checkboxes = document.querySelectorAll('.extra-feature:checked');
            let featuresText = '';
            if (checkboxes.length > 0) {
                featuresText = `\n\nДОПОЛНИТЕЛЬНЫЕ ИГРОВЫЕ МЕХАНИКИ:\n`;
                checkboxes.forEach((cb, index) => {
                    featuresText += `${index + 1}. ${cb.value}\n`;
                });
            }

            const gameInfo = this.games[gameId];
            let template = gameInfo.template;

            // Замена базовых переменных
            template = template.replace(/{SUBJECT}/g, subject);
            template = template.replace(/{TOPIC}/g, topic);
            template = template.replace(/{GRADE}/g, grade);

            // Замена динамических переменных
            if (gameInfo.fields) {
                gameInfo.fields.forEach(field => {
                    const el = document.getElementById(`dyn_${field.id}`);
                    const val = el && el.value ? el.value : `[УКАЖИТЕ ${field.label}]`;
                    const regex = new RegExp(`{${field.id}}`, 'g');
                    template = template.replace(regex, val);
                });
            }

            // УНИВЕРСАЛЬНЫЙ ТЕХНИЧЕСКИЙ БЛОК ДЛЯ ВСЕХ ПРОМТОВ
            const langDifficultyText = langLevel !== 'Любой / Не применимо' ? `Уровень сложности языка (CEFR): ${langLevel}\n` : '';

            const techSuffix = `\n\n=== НАСТРОЙКИ СЕССИИ ===\n` +
                `Режим игры: ${gameMode}\n` +
                langDifficultyText +
                `\n=== ТЕХНИЧЕСКИЕ ТРЕБОВАНИЯ ===\n` +
                `Язык интерфейса: Все тексты, кнопки, меню и системные сообщения должны быть на языке: ${finalLang}.\n\n` +
                `Логика вопросов:\n` +
                `1. Встрой в код базу данных из ${qCount} уникальных вопросов по указанной теме.\n` +
                `2. Вопросы не должны идти по порядку! При каждом запуске игры используй алгоритм Фишера-Йетса (Fisher-Yates shuffle) для перемешивания массива вопросов.\n` +
                `3. ВАЖНО: Настрой логику так, чтобы после вывода вопроса он УДАЛЯЛСЯ из пула. Вопросы КАТЕГОРИЧЕСКИ НЕ должны повторяться в рамках одной игровой сессии.` + 
                featuresText + 
                `\n\nПравила кода и дизайна:\n` +
                `1. Напиши весь код строго в ОДНОМ файле (HTML, CSS внутри тега <style>, JS внутри тега <script>). Без внешних библиотек (кроме шрифтов).\n` +
                `2. Код должен быть полностью рабочим сразу после копирования. Учти выбранный 'Режим игры' в логике подсчета очков или ходов.\n` +
                `3. ${deviceText}\n` +
                `4. Дизайн должен быть современным и привлекательным: используй Glassmorphism, мягкие градиентные заливки, глубокие тени, скругления (border-radius), читабельную типографику и плавные hover-эффекты на кнопках.`;

            document.getElementById('result-prompt').value = template + techSuffix;
        },

        copyToClipboard() {
            const copyText = document.getElementById("result-prompt");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            this.showToast("Промт скопирован в буфер обмена!");
        }
    };
</script>
</body>
</html>
